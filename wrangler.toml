name = "echo-revenue-engine"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
VERSION = "1.0.0"

[[d1_databases]]
binding = "DB"
database_name = "echo-revenue-engine"
database_id = "aecd55a8-54bc-42d1-91a8-8041e272ce4a"

[[kv_namespaces]]
binding = "CACHE"
id = "34e4770eb9d541c980fb058915a4a760"

[[r2_buckets]]
binding = "PRODUCTS"
bucket_name = "echo-prime-products"

# Service bindings for ECHO backend
[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "ECHO_CHAT"
service = "echo-chat"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "SWARM_BRAIN"
service = "echo-swarm-brain"

[[services]]
binding = "KNOWLEDGE_FORGE"
service = "echo-knowledge-forge"

# Cron triggers for autonomous operation
[triggers]
crons = [
  "0 6 * * 1",
  "0 14 * * 3",
  "0 10 1 * *",
  "0 18 * * 5",
]
# Monday 12am CST: Weekly product generation
# Wednesday 8am CST: Mid-week promotion push
# 1st of month 4am CST: Monthly product launch
# Friday 12pm CST: Weekend sale push
